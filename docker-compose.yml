# Proxmox 等: cp .env.example .env を編集（DISCORD_BOT_TOKEN + OPENCLAW_*）→ docker compose up -d --build
# 既定スタックは discord-reply-bot のみ（OpenClaw）。Cursor agent-gateway は含みません。

services:
  discord-reply-bot:
    build: .
    image: discord-reply-bot:latest
    container_name: discord-reply-bot
    restart: unless-stopped
    env_file:
      - .env
    # ホストで Tailscale + MagicDNS でも、bridge コンテナは Quad100 を明示しないと
    # *.ts.net が引けず OpenClaw へ接続がハングすることがある。
    dns:
      - 100.100.100.100
      - 8.8.8.8
    networks:
      - discord_stack

networks:
  discord_stack:
    driver: bridge
