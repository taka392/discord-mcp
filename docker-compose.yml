# Proxmox 等: cp .env.example .env を編集（DISCORD_BOT_TOKEN + OPENCLAW_*）→ docker compose up -d --build
# 既定スタックは discord-reply-bot のみ（OpenClaw）。Cursor agent-gateway は含みません。

services:
  discord-reply-bot:
    build: .
    image: discord-reply-bot:latest
    container_name: discord-reply-bot
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - discord_stack

networks:
  discord_stack:
    driver: bridge
